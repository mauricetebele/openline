<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5EA6"/>
      <stop offset="100%" stop-color="#C1342C"/>
    </linearGradient>
  </defs>
  <!-- Curved connecting line -->
  <path d="M60 105 C100 120, 160 40, 210 55" stroke="url(#lineGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Left blue dot (outer ring) -->
  <circle cx="58" cy="104" r="10" stroke="#1B5EA6" stroke-width="3.5" fill="none"/>
  <circle cx="58" cy="104" r="3" fill="#1B5EA6"/>
  <!-- Right red dot (outer ring) -->
  <circle cx="212" cy="54" r="11" stroke="#C1342C" stroke-width="3.5" fill="none"/>
  <circle cx="212" cy="54" r="3.5" fill="#C1342C"/>
  <!-- OPEN LINE text -->
  <text x="140" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#1B3A5C" letter-spacing="3">OPEN LINE</text>
  <!-- MOBILITY text -->
  <text x="140" y="175" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#C1342C" letter-spacing="6">MOBILITY</text>
</svg>
